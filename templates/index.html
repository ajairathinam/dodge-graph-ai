<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dodge Graph Explorer</title>
    <style>
      * { box-sizing: border-box; }
      body { 
        font-family: Arial, Helvetica, sans-serif; 
        margin: 0; 
        padding: 8px; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        min-height: 100vh;
      }
      h1 { margin: 8px 0 4px 0; color: #fff; font-size: 24px; }
      p { margin: 2px 0; font-size: 12px; color: #eee; }
      code { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 3px; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      label { font-size: 13px; font-weight: 500; }
      input { padding: 5px 6px; width: 100px; font-size: 12px; }
      button { padding: 6px 10px; cursor: pointer; background: #667eea; color: #fff; border: none; border-radius: 4px; font-size: 12px; font-weight: 500; }
      button:hover { background: #764ba2; }
      #layout { display: flex; gap: 10px; align-items: stretch; height: calc(100vh - 120px); flex-wrap: wrap; }
      #leftPane { flex: 1; min-width: 300px; display: flex; flex-direction: column; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px; }
      #chart { border: 1px solid #ddd; border-radius: 6px; margin-top: 8px; width: 100%; flex: 1; }
      #status { margin-top: 4px; font-size: 12px; color: #666; }
      .control-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      #sidebar {
        width: 320px;
        height: calc(100vh - 120px);
        border: none;
        border-radius: 8px;
        padding: 0;
        background: rgba(255,255,255,0.98);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 12px 12px 0 12px;
        flex-shrink: 0;
      }
      #sidebar h2 { margin: 0 0 8px 0; font-size: 16px; color: #667eea; }
      #chatMessages {
        flex: 1;
        overflow-y: auto;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 8px;
        background: #f8f9fa;
        margin: 0;
        margin-top: 8px;
      }
      .sidebar-input-area {
        padding: 12px;
        flex-shrink: 0;
        border-top: 1px solid #eee;
        background: rgba(255,255,255,0.98);
      }
      .msg { margin-bottom: 8px; font-size: 12px; }
      .role { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
      .bubble {
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.3;
        padding: 8px;
        border-radius: 8px;
        word-wrap: break-word;
      }
      .user { text-align: right; }
      .user .role { color: #667eea; }
      .user .bubble { background: #000; color: #fff; margin-left: 20px; }
      .assistant { text-align: left; }
      .assistant .role { color: #764ba2; }
      .assistant .bubble { background: #fff; color: #000; border: 1px solid #ddd; margin-right: 20px; }
      textarea#chatInput {
        width: 100%;
        padding: 6px;
        border-radius: 4px;
        border: 1px solid #ddd;
        font-size: 12px;
        font-family: Arial, sans-serif;
        resize: none;
        margin: 0 0 6px 0;
        height: 50px;
      }
      .chat-buttons { display: flex; gap: 6px; }
      .chat-buttons button { flex: 1; font-size: 11px; padding: 5px 8px; }
      @media (max-width: 1400px) {
        #layout { flex-direction: column; height: auto; }
        #leftPane { min-height: 400px; }
        #sidebar { width: 100%; height: 400px; margin-top: 10px; }
      }
    </style>
    
  </head>
  <body>
    <h1>Dodge Graph Explorer</h1>
    <p>Explore the dataset schema and build graph models for orders, deliveries, invoices, and payments.</p>

    <div id="layout">
      <div id="leftPane">
        <div class="control-row">
          <label>max_records <input id="maxRecords" type="number" value="2000" min="1" step="500"></label>
          <label>max_nodes <input id="maxNodes" type="number" value="400" min="1" step="50"></label>
          <label>max_edges <input id="maxEdges" type="number" value="600" min="1" step="50"></label>
          <button id="loadBtn" type="button">Load Graph</button>
        </div>
        <div id="status">Click "Load Graph" to visualize.</div>
        <svg id="chart" width="100%" height="600" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <aside id="sidebar">
        <div class="sidebar-header">
          <h2>💬 Dodge AI Chat</h2>
        </div>
        <div id="chatMessages"></div>
        <div class="sidebar-input-area">
          <textarea id="chatInput" rows="2" placeholder="Ask about the graph/schema..."></textarea>
          <div class="chat-buttons">
            <button id="sendBtn" type="button">Send</button>
           
          </div>
        </div>
      </aside>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
